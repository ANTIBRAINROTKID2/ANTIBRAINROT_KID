/* ===== WHITE NEON CUSTOM CURSOR ===== */
#cursor {
  position: fixed;
  width: 20px;
  height: 20px;
  border: 2px solid #ffffff;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  box-shadow: 
    0 0 15px #ffffff,
    0 0 30px #ffffff,
    0 0 50px #ffffff;
  transition: width 0.2s, height 0.2s;
  mix-blend-mode: difference;
}

#cursor::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 6px;
  height: 6px;
  background: #ffffff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 12px #ffffff;
}

/* Падающие частицы — чисто белые */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: #ffffff;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  box-shadow: 0 0 10px #ffffff;
  opacity: 0;
}

/* Остальные стили */

<script>
// Кастомный курсор + белые частицы
const cursor = document.getElementById('cursor');

document.addEventListener('mousemove', (e) => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';

  if (Math.random() < 0.65) {
    createTrailParticle(e.clientX, e.clientY);
  }
});

function createTrailParticle(x, y) {
  const particle = document.createElement('div');
  particle.classList.add('particle');
  
  const size = Math.random() * 5 + 3;
  particle.style.width = size + 'px';
  particle.style.height = size + 'px';
  particle.style.left = x + 'px';
  particle.style.top = y + 'px';
  
  document.body.appendChild(particle);

  const fallDistance = Math.random() * 90 + 50;
  const duration = Math.random() * 900 + 700;

  particle.animate([
    { transform: 'translate(0, 0)', opacity: 0.85 },
    { transform: `translate(${Math.random()*18-9}px, ${fallDistance}px)`, opacity: 0 }
  ], {
    duration: duration,
    easing: 'ease-out'
  });

  setTimeout(() => particle.remove(), duration + 100);
}

// Typewriter Effect
const texts = ["Team of bypass.", "Big community.", "Join Today!"];
let currentIndex = 0;
const subtitle = document.getElementById("subtitle");

function typeWriter(text, i, callback) {
  if (i < text.length) {
    subtitle.innerHTML = text.substring(0, i + 1) + '<span style="opacity:0.4;">|</span>';
    setTimeout(() => typeWriter(text, i + 1, callback), 60);
  } else {
    subtitle.innerHTML = text + '<span style="opacity:0.4;">|</span>';
    setTimeout(callback, 1800);
  }
}

function deleteText(text, i, callback) {
  if (i > 0) {
    subtitle.innerHTML = text.substring(0, i - 1) + '<span style="opacity:0.4;">|</span>';
    setTimeout(() => deleteText(text, i - 1, callback), 35);
  } else {
    callback();
  }
}

function startTypingCycle() {
  const currentText = texts[currentIndex];
  typeWriter(currentText, 0, () => {
    deleteText(currentText, currentText.length, () => {
      currentIndex = (currentIndex + 1) % texts.length;
      startTypingCycle();
    });
  });
}
startTypingCycle();

// Остальные функции
function openExecutors() {
  document.getElementById("home").classList.remove("active");
  document.getElementById("executors").classList.add("active");
}

function openScripts() {
  document.getElementById("home").classList.remove("active");
  document.getElementById("scripts").classList.add("active");
}

function goBackToHome() {
  document.getElementById("scripts").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

function goBack() {
  document.getElementById("executors").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

function copyScript(type) {
  let scriptText = "";
  let btnId = "";

  if (type === "hub") {
    scriptText = `loadstring(game:HttpGet("https://raw.githubusercontent.com/ANTIBRAINROTKID2/ANTIBRAINROT_KID-Hub-loadscreen/refs/heads/main/LoadScreen"))()`;
    btnId = "hubBtn";
  } else if (type === "searcher") {
    scriptText = `loadstring(game:HttpGet("https://raw.githubusercontent.com/ANTIBRAINROTKID2/ScriptBlox-Searcher/refs/heads/main/MainScript"))()`;
    btnId = "searcherBtn";
  } else if (type === "lucky") {
    scriptText = `loadstring(game:HttpGet("https://raw.githubusercontent.com/ANTIBRAINROTKID2/Lucky-Hub-Lucky-Block-Battlegrounds-/refs/heads/main/Kid"))()`;
    btnId = "luckyBtn";
  }

  navigator.clipboard.writeText(scriptText).then(() => {
    const btn = document.getElementById(btnId);
    const originalText = btn.textContent;
    btn.classList.add("copied");
    btn.textContent = "Copied script!";
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.textContent = originalText;
    }, 1500);
  });
}

function openLink(app) {
  const links = {
    xeno: "https://xeno.now", jjsploit: "https://wearedevs.net/d/JJSploit",
    velocity: "https://realvelocity.xyz/", solara: "https://getsolara.dev/",
    bunni: "https://discord.gg/bunni-fun", fogoty: "https://foggysoftworks.xyz/main.html",
    delta: "https://deltaexploits.gg/", arceus: "https://spdmteam.com/",
    codex: "https://codex.lol/", eclipse: "https://eclipse.download/",
    vega: "https://vegax.gg/", madium: "https://getmadium.net",
    real: "https://realest.gg/"
  };
  if (links[app]) window.open(links[app], "_blank");
}

/* Background Particles */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
let bgParticles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

function createBgParticles() {
  bgParticles = [];
  for (let i = 0; i < 80; i++) {
    bgParticles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2,
      dx: (Math.random() - 0.5) * 0.5,
      dy: (Math.random() - 0.5) * 0.5
    });
  }
}
createBgParticles();

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";
  bgParticles.forEach(p => {
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>
